[project]
site_name = "yak"
site_description = "Yet Another AWS Kit — AWS SSO and credential management done right"
site_url = "https://yak.anadinema.dev/"
repo_url = "https://github.com/anadinema/yak"
repo_name = "anadinema/yak"
site_author = "Anadi Nema"
copyright = """
&copy; 2026 Anadi Nema
"""
docs_dir = "docs"
site_dir = "site"

# Use below once the catpucchin theme is usable in zensical
# extra_css = ["stylesheets/extra.css"]

nav = [
    { "Home" = "index.md" },
    { "Getting Started" = [
        { "Install" = "install.md" },
        { "Quickstart" = "quickstart.md" }
    ] },
    { "Configuration" = [
        { "Overview" = "config/overview.md" },
        { "Reference" = "config/reference.md" },
        { "Examples" = [
            { "TOML + Env vars" = "config/examples/toml-env.md" },
            { "TOML + 1Password" = "config/examples/toml-op.md" },
            { "YAML + Env vars" = "config/examples/yaml-env.md" },
            { "YAML + 1Password" = "config/examples/yaml-op.md" }
        ] }
    ] },
    { "Commands" = [
        { "Overview" = "commands/index.md" },
        { "Subcommands" = [
            { "setup" = "commands/setup.md" },
            { "login" = "commands/login.md" },
            { "account" = "commands/account.md" },
            { "role" = "commands/role.md" },
            { "export" = "commands/export.md" },
            { "status" = "commands/status.md" },
            { "accounts" = "commands/accounts.md" },
            { "roles" = "commands/roles.md" }
        ] }
    ] },
    { "Guides" = [
        { "Windows (Git Bash)" = "guides/windows-git-bash.md" },
        { "Shell Integration" = "guides/shell-integration.md" },
        { "Migrating from Shell Functions" = "guides/migrating.md" },
        { "Using with 1Password" = "guides/onepassword.md" },
        { "Safeguards" = "guides/safeguards.md" }
    ] }
]

[project.theme]
variant = "modern"
language = "en"
logo = "assets/yak.png"
favicon = "assets/yak.ico"
font.text = "Poppins"
font.code = "JetBrains Mono"

features = [
    "navigation.sections",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.tracking",
    "navigation.sections",
    "navigation.expand",
    "navigation.path",
    "navigation.top",
    "search.highlight",
    "content.code.copy",
    "content.code.select",
    "content.code.annotate",
    "content.action.edit",
    "content.tooltips",
    "toc.follow"
]

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "material/pencil"

[project.extra.version]
provider = "mike"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"
primary = "purple"
accent = "deep purple"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
# Use below once the catpucchin theme is usable in zensical
# scheme = "latte"
# primary = "custom"
# accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
primary = "purple"
accent = "deep purple"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
# Use below once the catpucchin theme is usable in zensical
# scheme = "mocha"
# primary = "custom"
# accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"
primary = "purple"
accent = "deep purple"

[[project.extra.social]]
icon = "fontawesome/solid/envelope"
link = "mailto:anadi.nema@outlook.com"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/anadinema"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/anadinema"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
linenums = true
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

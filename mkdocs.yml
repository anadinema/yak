site_name: yak
site_description: Yet Another AWS Kit — AWS SSO and credential management done right
site_url: https://yak.anadinema.dev
repo_url: https://github.com/anadinema/yak
repo_name: anadinema/yak

theme:
  name: material
  logo: assets/yak.png
  favicon: assets/yak.ico
  font:
    text: Poppins
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips
    - toc.follow
  palette:
    - scheme: mocha
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-cloudy
        name: Dark
    - scheme: latte
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Light

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

# Copyright notice
copyright: Copyright &copy; 2026 anadinema

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anadinema/yak
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
    - Install: install.md
    - Quickstart: quickstart.md
  - Configuration:
    - Overview: config/overview.md
    - Reference: config/reference.md
    - Examples:
      - TOML + Env Vars: config/examples/toml-env.md
      - TOML + 1Password: config/examples/toml-op.md
      - YAML + Env Vars: config/examples/yaml-env.md
      - YAML + 1Password: config/examples/yaml-op.md
  - Commands:
    - Overview: commands/index.md
    - Subcommands:
      - setup: commands/setup.md
      - login: commands/login.md
      - account: commands/account.md
      - role: commands/role.md
      - export: commands/export.md
      - status: commands/status.md
      - accounts: commands/accounts.md
      - roles: commands/roles.md
  - Guides:
    - Windows (Git Bash): guides/windows-git-bash.md
    - Shell Integration: guides/shell-integration.md
    - Migrating from Shell Functions: guides/migrating.md
    - Using with 1Password: guides/onepassword.md
    - Safeguards: guides/safeguards.md
